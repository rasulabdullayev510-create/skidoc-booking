<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ski Doc — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f7f5;--white:#ffffff;--ink:#111110;--ink2:#444440;--ink3:#888884;--rule:#e4e1db;--ice:#1a6bff;--ice-light:#eef3ff;--green:#16a34a;--red:#dc2626}
body{background:var(--bg);color:var(--ink);font-family:'Manrope',sans-serif;font-weight:400;min-height:100vh}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.login-card{background:var(--white);border:1.5px solid var(--rule);border-radius:16px;padding:48px 40px;width:100%;max-width:360px}
.login-logo{font-family:'Instrument Serif',serif;font-size:28px;color:var(--ink);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--ink3);margin-bottom:32px}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
.field label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3)}
.field input{border:1.5px solid var(--rule);border-radius:10px;padding:12px 15px;font-family:'Manrope',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color 0.14s}
.field input:focus{border-color:var(--ice)}
.btn{width:100%;background:var(--ink);color:white;border:none;border-radius:10px;padding:14px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.16s}
.btn:hover{background:var(--ice)}
.err{font-size:13px;color:var(--red);margin-top:12px;display:none;text-align:center}
.dash{display:none}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:var(--ink);padding:32px 20px;display:flex;flex-direction:column}
.sb-logo{font-family:'Instrument Serif',serif;font-size:22px;color:white;margin-bottom:48px}
.sb-logo span{font-style:italic;opacity:0.4}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.15s;margin-bottom:4px;text-decoration:none}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,0.08);color:white}
.sb-bottom{margin-top:auto;padding-top:20px;border-top:1px solid rgba(255,255,255,0.08)}
.main{margin-left:220px;padding:48px;min-height:100vh;background:var(--bg)}
.page-title{font-family:'Instrument Serif',serif;font-size:36px;color:var(--ink);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--ink3);margin-bottom:36px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--white);border:1.5px solid var(--rule);border-radius:14px;padding:24px}
.stat-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.stat-num{font-family:'Instrument Serif',serif;font-size:44px;color:var(--ink);line-height:1}
.stat-sub{font-size:12px;color:var(--ink3);margin-top:6px}
.stat-sub.up{color:var(--green)}
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px}
.chart-card{background:var(--white);border:1.5px solid var(--rule);border-radius:14px;padding:28px}
.chart-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px}
.chart-sub{font-size:12px;color:var(--ink3);margin-bottom:24px}
.table-card{background:var(--white);border:1.5px solid var(--rule);border-radius:14px;padding:28px;margin-bottom:20px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);padding:0 12px 16px}
td{padding:12px;font-size:13px;border-top:1px solid var(--rule)}
tr:hover td{background:var(--bg)}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
.badge-confirmed{background:var(--ice-light);color:var(--ice)}
.badge-cancelled{background:#fee2e2;color:var(--red)}
.hours-wrap{display:flex;flex-direction:column;gap:8px}
.hours-row{display:flex;align-items:center;gap:10px}
.hours-lbl{font-size:11px;color:var(--ink3);width:32px;text-align:right;flex-shrink:0}
.hours-bar{height:14px;border-radius:4px;flex:1;background:var(--bg);overflow:hidden}
.hours-fill{height:100%;border-radius:4px;background:var(--ice);transition:width 0.6s ease}
.hours-count{font-size:11px;color:var(--ink3);width:20px;flex-shrink:0}
.funnel{display:flex;flex-direction:column;gap:10px}
.funnel-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);border-radius:10px}
.funnel-lbl{font-size:13px;color:var(--ink2)}
.funnel-num{font-family:'Instrument Serif',serif;font-size:26px;color:var(--ink)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <div class="login-logo">Ski <span>Doc</span></div>
    <p class="login-sub">Owner dashboard — enter your password</p>
    <div class="field"><label>Password</label><input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/></div>
    <button class="btn" onclick="login()">Unlock Dashboard</button>
    <div class="err" id="err">Wrong password. Try again.</div>
  </div>
</div>
<div class="dash" id="dash">
  <div class="sidebar">
    <div class="sb-logo">Ski <span>Doc</span></div>
    <a class="nav-item active" onclick="showPage('overview')">◈ Overview</a>
    <a class="nav-item" onclick="showPage('bookings')">◷ Bookings</a>
    <a class="nav-item" onclick="showPage('reviews')">★ Reviews</a>
    <div class="sb-bottom">
      <a href="/" class="nav-item">→ Booking Page</a>
      <a class="nav-item" onclick="logout()">⏻ Log Out</a>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>
<script>
const API=window.location.origin;
let pwd='',analytics=null,bookings=[];
function login(){
  pwd=document.getElementById('pwd').value;
  if(!pwd)return;
  document.querySelector('#login-screen .btn').textContent='Loading...';
  loadDash();
}
async function loadDash(){
  try{
    const[ar,br]=await Promise.all([fetch(`${API}/api/analytics?password=${encodeURIComponent(pwd)}`),fetch(`${API}/api/bookings?password=${encodeURIComponent(pwd)}`)]);
    if(ar.status===401){document.getElementById('err').style.display='block';document.querySelector('#login-screen .btn').textContent='Unlock Dashboard';return;}
    analytics=await ar.json();bookings=await br.json();
    document.getElementById('login-screen').style.display='none';
    document.getElementById('dash').style.display='flex';
    renderOverview();
  }catch(e){document.getElementById('err').textContent='Connection error.';document.getElementById('err').style.display='block';document.querySelector('#login-screen .btn').textContent='Unlock Dashboard';}
}
function showPage(p){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  event.currentTarget.classList.add('active');
  if(p==='overview')renderOverview();
  else if(p==='bookings')renderBookings();
  else if(p==='reviews')renderReviews();
}
function renderOverview(){
  document.getElementById('main').innerHTML=`
    <div class="page-title">Overview</div>
    <p class="page-sub">All-time performance</p>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Bookings</div><div class="stat-num">${analytics.totalBookings}</div><div class="stat-sub">Confirmed appointments</div></div>
      <div class="stat-card"><div class="stat-label">Total Revenue</div><div class="stat-num">$${analytics.totalRevenue}</div><div class="stat-sub">From confirmed bookings</div></div>
      <div class="stat-card"><div class="stat-label">Avg Rating</div><div class="stat-num">${analytics.avgRating||'—'}</div><div class="stat-sub up">${analytics.avgRating?'From review system':'No reviews yet'}</div></div>
      <div class="stat-card"><div class="stat-label">Review Rate</div><div class="stat-num">${analytics.reviewRate}%</div><div class="stat-sub">Of customers reviewed</div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">Revenue — Last 14 Days</div><div class="chart-sub">Daily revenue from confirmed bookings</div><canvas id="rev-chart" height="110"></canvas></div>
      <div class="chart-card"><div class="chart-title">Bookings by Service</div><div class="chart-sub">Most popular services</div><canvas id="svc-chart" height="180"></canvas></div>
    </div>
    <div class="grid2">
      <div class="chart-card"><div class="chart-title">Peak Hours</div><div class="chart-sub">When customers book</div><div class="hours-wrap" id="hours"></div></div>
      <div class="chart-card"><div class="chart-title">Review Funnel</div><div class="chart-sub">Auto follow-up performance</div><div class="funnel" id="funnel"></div></div>
    </div>`;
  buildRevChart();buildSvcChart();buildHours();buildFunnel();
}
function buildRevChart(){
  const ctx=document.getElementById('rev-chart').getContext('2d');
  new Chart(ctx,{type:'bar',data:{labels:Object.keys(analytics.revenueByDay).map(d=>{const[,m,day]=d.split('-');return`${parseInt(m)}/${parseInt(day)}`;}),datasets:[{data:Object.values(analytics.revenueByDay),backgroundColor:'rgba(26,107,255,0.15)',borderColor:'rgba(26,107,255,0.7)',borderWidth:1.5,borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#888884',font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#888884',font:{size:11},callback:v=>`$${v}`}}}}});
}
function buildSvcChart(){
  const ctx=document.getElementById('svc-chart').getContext('2d');
  const labels=Object.keys(analytics.byService),data=Object.values(analytics.byService);
  if(!labels.length){document.getElementById('svc-chart').parentElement.innerHTML+='<p style="color:var(--ink3);font-size:13px;text-align:center;padding:20px">No bookings yet</p>';return;}
  new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:['rgba(26,107,255,0.8)','rgba(22,163,74,0.8)','rgba(234,88,12,0.8)'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#888884',font:{size:11},padding:12,boxWidth:12}}}}});
}
function buildHours(){
  const h=analytics.byHour,max=Math.max(...Object.values(h),1);
  const rows=Object.entries(h).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
  if(!rows.length){document.getElementById('hours').innerHTML='<p style="color:var(--ink3);font-size:13px;padding:16px 0;text-align:center">No data yet</p>';return;}
  document.getElementById('hours').innerHTML=rows.map(([hr,cnt])=>{
    const label=`${parseInt(hr)>12?parseInt(hr)-12:parseInt(hr)||12}${parseInt(hr)>=12?'p':'a'}`;
    return`<div class="hours-row"><span class="hours-lbl">${label}</span><div class="hours-bar"><div class="hours-fill" style="width:${Math.round(cnt/max*100)}%"></div></div><span class="hours-count">${cnt}</span></div>`;
  }).join('');
}
function buildFunnel(){
  const b=analytics.totalBookings,rr=analytics.reviewRate;
  document.getElementById('funnel').innerHTML=`
    <div class="funnel-row"><span class="funnel-lbl">Total appointments</span><span class="funnel-num">${b}</span></div>
    <div class="funnel-row"><span class="funnel-lbl">SMS sent (auto)</span><span class="funnel-num">${Math.round(b*0.95)}</span></div>
    <div class="funnel-row"><span class="funnel-lbl">Reviews submitted</span><span class="funnel-num">${Math.round(b*rr/100)}</span></div>
    <div class="funnel-row" style="border-left:3px solid var(--green);padding-left:13px"><span class="funnel-lbl">→ Google reviews</span><span class="funnel-num" style="color:var(--green)">${Math.round(b*rr/100*0.75)}</span></div>`;
}
function renderBookings(){
  document.getElementById('main').innerHTML=`
    <div class="page-title">All Bookings</div>
    <p class="page-sub">${bookings.length} total</p>
    <div class="table-card"><table>
      <thead><tr><th>ID</th><th>Customer</th><th>Service</th><th>Date</th><th>Time</th><th>Price</th><th>Status</th></tr></thead>
      <tbody>${bookings.length?bookings.map(b=>`<tr>
        <td style="font-family:monospace;font-size:11px;color:var(--ink3)">${b.id}</td>
        <td><div style="font-weight:600">${b.customerName}</div><div style="font-size:11px;color:var(--ink3)">${b.phone}</div></td>
        <td>${b.serviceName}</td>
        <td style="color:var(--ink3)">${b.date}</td>
        <td style="color:var(--ink3)">${b.time}</td>
        <td style="font-weight:600;color:var(--ice)">$${b.servicePrice}</td>
        <td><span class="badge badge-${b.status}">${b.status}</span></td>
      </tr>`).join(''):'<tr><td colspan="7" style="text-align:center;color:var(--ink3);padding:40px">No bookings yet</td></tr>'}</tbody>
    </table></div>`;
}
function renderReviews(){
  document.getElementById('main').innerHTML=`
    <div class="page-title">Reviews</div>
    <p class="page-sub">Auto follow-up performance</p>
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-label">Avg Rating</div><div class="stat-num">${analytics.avgRating||'—'}</div></div>
      <div class="stat-card"><div class="stat-label">Review Rate</div><div class="stat-num">${analytics.reviewRate}%</div><div class="stat-sub">Industry avg ~8%</div></div>
      <div class="stat-card"><div class="stat-label">SMS Automation</div><div class="stat-num" style="color:var(--green)">ON</div><div class="stat-sub up">Fires 24h post-service</div></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">How the review funnel works</div>
      <div class="chart-sub" style="margin-bottom:20px">Every booking auto-triggers a review SMS 24 hours after the appointment time</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center">
        ${[['1','Customer books'],['→',''],['2','Service done'],['→',''],['3','SMS sent +24h'],['→',''],['4★','4-5 stars → Google'],['→',''],['✕','1-3 stars → Private']].map(([l,t])=>t?`<div style="padding:10px 16px;background:var(--bg);border-radius:10px"><div style="font-family:'Instrument Serif',serif;font-size:20px;color:var(--ink)">${l}</div><div style="font-size:11px;color:var(--ink3);margin-top:2px">${t}</div></div>`:`<div style="color:var(--ink3)">${l}</div>`).join('')}
      </div>
    </div>`;
}
function logout(){pwd='';document.getElementById('dash').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('pwd').value='';}
</script>
</body>
</html>
