<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ski Doc — How was your visit?</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--white:#fff;--bg:#f7f7f5;--rule:#e4e1db;--ink:#111110;--ink2:#444440;--ink3:#888884;--ice:#1a6bff;--ice-light:#eef3ff;--green:#16a34a;--green-light:#dcfce7;--red:#dc2626}
body{background:var(--bg);color:var(--ink);font-family:'Manrope',sans-serif;font-weight:400;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--white);border:1.5px solid var(--rule);border-radius:20px;padding:48px 40px;width:100%;max-width:420px}
.logo{font-family:'Instrument Serif',serif;font-size:18px;color:var(--ink3);margin-bottom:32px}
.logo span{font-style:italic}
.greeting{font-family:'Instrument Serif',serif;font-size:38px;color:var(--ink);line-height:1.1;margin-bottom:8px}
.svc-tag{display:inline-block;background:var(--ice-light);color:var(--ice);border-radius:6px;padding:4px 12px;font-size:12px;font-weight:600;letter-spacing:0.05em;margin-bottom:20px}
.sub{font-size:14px;color:var(--ink3);line-height:1.7;margin-bottom:32px}
.stars{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
.star{font-size:40px;cursor:pointer;transition:transform 0.12s;opacity:0.25;user-select:none}
.star:hover,.star.on{opacity:1;transform:scale(1.08)}
.star-lbl{text-align:center;font-size:13px;color:var(--ink3);margin-bottom:24px;min-height:20px}
textarea{width:100%;border:1.5px solid var(--rule);border-radius:10px;padding:12px 15px;font-family:'Manrope',sans-serif;font-size:14px;color:var(--ink);outline:none;resize:none;min-height:84px;margin-bottom:18px;transition:border-color 0.14s;background:var(--white)}
textarea:focus{border-color:var(--ice);background:var(--ice-light)}
textarea::placeholder{color:#ccc}
.btn{width:100%;background:var(--ink);color:white;border:none;border-radius:10px;padding:14px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.16s}
.btn:hover:not(:disabled){background:var(--ice)}
.btn:disabled{opacity:0.3;cursor:default}
.done{display:none;text-align:center}
.done-check{width:64px;height:64px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.done-check svg{width:28px;height:28px}
.done-title{font-family:'Instrument Serif',serif;font-size:38px;color:var(--ink);margin-bottom:8px}
.done-sub{font-size:14px;color:var(--ink3);line-height:1.7;margin-bottom:24px}
.google-btn{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:white;border:none;border-radius:10px;padding:13px 24px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity 0.16s}
.google-btn:hover{opacity:0.88}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Ski <span>Doc</span> Calgary</div>
  <div id="form-screen">
    <div class="greeting" id="greeting">How was your visit?</div>
    <div class="svc-tag" id="svc-tag">Loading...</div>
    <p class="sub">Takes 20 seconds. Your feedback helps us keep doing what we love.</p>
    <div class="stars" id="stars">
      <span class="star" data-v="1">⭐</span>
      <span class="star" data-v="2">⭐</span>
      <span class="star" data-v="3">⭐</span>
      <span class="star" data-v="4">⭐</span>
      <span class="star" data-v="5">⭐</span>
    </div>
    <div class="star-lbl" id="star-lbl">Tap to rate</div>
    <textarea id="comment" placeholder="Any thoughts? (optional)"></textarea>
    <button class="btn" id="sub-btn" disabled onclick="submit()">Submit Review</button>
  </div>
  <div class="done" id="done-screen">
    <div class="done-check"><svg viewBox="0 0 28 28" fill="none"><path d="M5 14L11 20L23 8" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="done-title" id="done-title">Thank you!</div>
    <p class="done-sub" id="done-sub">Your feedback means a lot to us.</p>
    <div id="google-cta"></div>
  </div>
</div>
<script>
const API=window.location.origin;
const token=new URLSearchParams(window.location.search).get('token');
let rating=0;
const labels=['','Disappointing','Could be better','It was okay','Really good!','Perfect! ⭐'];
async function init(){
  if(!token){document.getElementById('svc-tag').textContent='Invalid link';return;}
  try{
    const r=await fetch(`${API}/api/review/${token}`);
    if(!r.ok){document.getElementById('svc-tag').textContent='Booking not found';return;}
    const d=await r.json();
    document.getElementById('greeting').textContent=`Hey ${d.customerName.split(' ')[0]}!`;
    document.getElementById('svc-tag').textContent=d.serviceName;
    if(d.alreadyReviewed){document.getElementById('form-screen').style.display='none';document.getElementById('done-screen').style.display='block';document.getElementById('done-title').textContent='Already submitted';document.getElementById('done-sub').textContent="You've already reviewed this visit. Thanks!";}
  }catch{document.getElementById('svc-tag').textContent='Could not load';}
}
document.querySelectorAll('.star').forEach(s=>{
  s.addEventListener('click',()=>{
    rating=parseInt(s.dataset.v);
    document.querySelectorAll('.star').forEach((st,i)=>st.classList.toggle('on',i<rating));
    document.getElementById('star-lbl').textContent=labels[rating];
    document.getElementById('sub-btn').disabled=false;
  });
  s.addEventListener('mouseover',()=>{
    const v=parseInt(s.dataset.v);
    document.querySelectorAll('.star').forEach((st,i)=>st.style.opacity=i<v?'1':'0.25');
    document.getElementById('star-lbl').textContent=labels[v];
  });
  s.addEventListener('mouseout',()=>{
    document.querySelectorAll('.star').forEach((st,i)=>st.style.opacity=i<rating?'1':'0.25');
    document.getElementById('star-lbl').textContent=rating?labels[rating]:'Tap to rate';
  });
});
async function submit(){
  const btn=document.getElementById('sub-btn');
  btn.textContent='Submitting...';btn.disabled=true;
  const r=await fetch(`${API}/api/review`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,rating,comment:document.getElementById('comment').value.trim()})});
  const d=await r.json();
  document.getElementById('form-screen').style.display='none';
  document.getElementById('done-screen').style.display='block';
  if(d.redirectToGoogle){
    document.getElementById('done-title').textContent='Amazing!';
    document.getElementById('done-sub').textContent="So glad we nailed it! Mind leaving us a quick Google review?";
    document.getElementById('google-cta').innerHTML='<a class="google-btn" href="https://search.google.com/local/writereview?placeid=YOUR_PLACE_ID" target="_blank">Leave a Google Review →</a>';
  }else{
    document.getElementById('done-title').textContent='Thanks for the feedback';
    document.getElementById('done-sub').textContent="We're sorry it wasn't perfect. We'll use this to improve. Hope to see you again!";
  }
}
init();
</script>
</body>
</html>
